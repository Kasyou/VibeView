<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VibeView · Claude</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
      background:#0d1117;color:#c9d1d9;min-height:100vh;
    }
    #header{
      display:flex;align-items:center;gap:12px;padding:10px 20px;
      background:#161b22;border-bottom:1px solid #30363d;
      position:sticky;top:0;z-index:10;
    }
    #brand{font-weight:700;font-size:14px;color:#e94560}
    #subtitle{font-size:11px;color:#666}
    #status{margin-left:auto;font-size:11px;color:#666}
    #board{
      max-width:800px;margin:0 auto;padding:20px;
    }
    .card{
      background:#161b22;border:1px solid #30363d;border-radius:8px;
      padding:20px;margin-bottom:16px;animation:fadeIn .3s ease;
    }
    .card-meta{display:flex;gap:8px;align-items:center;margin-bottom:6px}
    .card-seq{font-size:11px;color:#58a6ff;font-weight:600;background:#0d1117;padding:1px 6px;border-radius:3px}
    .card-time{font-size:11px;color:#484f58}
    .card-title{font-size:13px;font-weight:600;color:#e94560;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
    .card h1,.card h2,.card h3{color:#f0f6fc;margin:12px 0 8px}
    .card h1{font-size:20px}.card h2{font-size:16px}.card h3{font-size:14px}
    .card p,.card li{font-size:14px;line-height:1.6;color:#c9d1d9;margin:4px 0}
    .card ul,.card ol{padding-left:24px;margin:8px 0}
    .card code{
      background:#0d1117;padding:2px 6px;border-radius:3px;
      font-family:'Cascadia Code',Consolas,monospace;font-size:12px;color:#7ee787;
    }
    .card pre{
      background:#0d1117;border:1px solid #30363d;border-radius:6px;
      padding:16px;overflow-x:auto;margin:12px 0;
    }
    .card pre code{background:none;padding:0;color:#c9d1d1;font-size:12px;line-height:1.5}
    .card table{width:100%;border-collapse:collapse;margin:12px 0;font-size:13px}
    .card th{background:#21262d;padding:8px 12px;text-align:left;font-weight:600;border:1px solid #30363d}
    .card td{padding:8px 12px;border:1px solid #30363d}
    .card blockquote{
      border-left:3px solid #e94560;padding:8px 16px;margin:12px 0;
      color:#8b949e;font-style:italic;
    }
    .card hr{border:none;border-top:1px solid #30363d;margin:16px 0}
    .card strong{color:#f0f6fc}
    .card a{color:#58a6ff}
    .card .tag{
      display:inline-block;background:#21262d;color:#8b949e;
      padding:2px 8px;border-radius:12px;font-size:11px;margin:2px 4px 2px 0;
    }
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .mermaid{background:#0d1117;border-radius:6px;padding:16px;margin:12px 0;overflow-x:auto}
    .mermaid svg{max-width:100%}
    #empty-state{
      text-align:center;padding:60px 20px;color:#484f58;
    }
    #empty-state .icon{font-size:48px;margin-bottom:16px}
    #empty-state p{font-size:14px}
  </style>
</head>
<body>
  <div id="header">
    <span id="brand">VibeView</span>
    <span id="subtitle">Claude Whiteboard</span>
    <span id="status">connecting</span>
  </div>
  <div id="board">
    <div id="empty-state">
      <div class="icon">&#9670;</div>
      <p>Claude will show ideas here</p>
    </div>
  </div>
  <script src="/_vibeview/mermaid.min.js"></script>
  <script>mermaid.initialize({startOnLoad:false,theme:'dark',securityLevel:'loose'});</script>
  <script src="/_vibeview/claude.js"></script>
</body>
</html>
